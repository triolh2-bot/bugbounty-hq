<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if program %}Edit{% else %}New{% endif %} Program - BugBountyHQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="bg-white border-b">
        <div class="max-w-6xl mx-auto px-4 py-4">
            <a href="/programs" class="text-emerald-600 hover:underline">← Back to Programs</a>
        </div>
    </header>

    <div class="max-w-2xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold mb-8">{% if program %}Edit{% else %}Create New{% endif %} Program</h1>
        
        <form method="POST" class="bg-white rounded-xl shadow-sm border p-6 space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Program Name</label>
                <input type="text" name="name" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none" placeholder="e.g., Acme Corp Bug Bounty">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                <textarea name="description" rows="3" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none" placeholder="Describe your program..."></textarea>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Scope (one per line)</label>
                <textarea name="scope" rows="5" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none" placeholder="*.example.com&#10;api.example.com&#10;mobile-app (iOS, Android)"></textarea>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Rules</label>
                <textarea name="rules" rows="4" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none" placeholder="Program rules and guidelines..."></textarea>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Bounty Range</label>
                <input type="text" name="bounty_range" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none" placeholder="$100 - $5,000">
            </div>
            
            <button type="submit" class="w-full bg-emerald-600 text-white py-3 rounded-lg font-medium hover:bg-emerald-700">
                {% if program %}Update{% else %}Create{% endif %} Program
            </button>
        </form>
    </div>
</body>
</html>
