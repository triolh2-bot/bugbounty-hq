<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - BugBountyHQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-lg w-full bg-white border rounded-xl shadow-sm p-8 text-center">
            <div class="text-5xl font-bold text-emerald-600 mb-4">{{ status_code }}</div>
            <h1 class="text-2xl font-semibold text-gray-900 mb-3">{{ title }}</h1>
            <p class="text-gray-600 mb-6">{{ message }}</p>
            <a href="/" class="inline-flex items-center justify-center rounded-lg bg-emerald-600 px-5 py-3 text-white hover:bg-emerald-700">
                Back to Home
            </a>
        </div>
    </div>
</body>
</html>
