<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BugBountyHQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="w-full max-w-md bg-white rounded-xl shadow-sm border p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-emerald-600">BugBountyHQ</h1>
                <p class="text-gray-600 mt-2">Sign in to manage programs and submissions.</p>
            </div>

            {% if error %}
            <div class="mb-4 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">{{ error }}</div>
            {% endif %}

            <form method="POST" class="space-y-5">
                <input type="hidden" name="next" value="{{ next_url }}">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                    <input type="email" name="email" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="admin@example.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <input type="password" name="password" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="Enter your password">
                </div>
                <button type="submit" class="w-full bg-emerald-600 text-white py-3 rounded-lg font-medium hover:bg-emerald-700">Sign In</button>
            </form>

            {% if bootstrap_registration_open %}
            <p class="mt-6 text-sm text-center text-gray-600">
                No users exist yet.
                <a href="/register" class="text-emerald-600 hover:underline">Create the first admin account</a>
            </p>
            {% endif %}
        </div>
    </div>
</body>
</html>
